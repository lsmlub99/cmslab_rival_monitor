services:
  - type: web
    name: kbeauty-intel
    runtime: python
    rootDir: CellFusionC_intel
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: postgres
      - key: DB_PORT
        value: "5432"
      - key: RENDER_EXTERNAL_URL
        sync: false
